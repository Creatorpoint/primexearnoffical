<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeX Official Offers</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
}

.top-buttons{
text-align:center;
margin-bottom:15px;
}

.top-buttons a{
display:inline-block;
margin:5px;
padding:10px 18px;
border-radius:25px;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
text-decoration:none;
font-weight:bold;
}

.featured{
margin:15px;
padding:15px;
border-radius:15px;
background:rgba(255,215,0,0.15);
border:1px solid gold;
}

.offer-card{
background:rgba(255,255,255,0.08);
margin:15px;
padding:15px;
border-radius:15px;
backdrop-filter:blur(10px);
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.offer-card img, .offer-card video{
width:100%;
border-radius:10px;
margin-top:10px;
}

.join-btn{
display:block;
text-align:center;
margin-top:10px;
padding:10px;
border-radius:20px;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
color:white;
text-decoration:none;
font-weight:bold;
}

.popup{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
background:#111;
padding:15px;
border-radius:15px;
width:90%;
max-width:400px;
text-align:center;
box-shadow:0 0 15px black;
}

.popup button{
margin-top:10px;
padding:8px 15px;
border:none;
border-radius:15px;
background:#ff4b2b;
color:white;
}

.sticky-bar{
position:fixed;
bottom:0;
width:100%;
background:linear-gradient(45deg,#ff416c,#ff4b2b);
text-align:center;
padding:10px;
}

.sticky-bar a{
color:white;
font-weight:bold;
text-decoration:none;
}
</style>
</head>
<body>

<header>🔥 PrimeX Official Offers</header>

<div class="top-buttons">
<a href="https://t.me/Primex_Shop07_Bot">📞 Contact</a>
<a href="https://t.me/+iu2fM-K0fVczMTE9">📢 Channel</a>
<a href="https://t.me/PRIME_X_CHAT2">💬 Chat</a>
</div>

<div id="featuredSection"></div>
<div id="offersContainer"></div>

<div class="popup" id="popup">
🚀 Join PrimeX Channel For Daily Premium Offers
<br>
<a href="https://t.me/+iu2fM-K0fVczMTE9" class="join-btn">Join Now</a>
<button onclick="closePopup()">Close</button>
</div>

<div class="sticky-bar">
<a href="https://t.me/+iu2fM-K0fVczMTE9">🔥 Join Telegram Channel Now</a>
</div>

<script>
let offers = JSON.parse(localStorage.getItem("primex_offers")) || [];

function renderOffers(){
let container=document.getElementById("offersContainer");
let featured=document.getElementById("featuredSection");
container.innerHTML="";
featured.innerHTML="";

offers.forEach((offer,index)=>{
if(!offer.active) return;

if(offer.expiry && new Date() > new Date(offer.expiry)) return;

let stars="⭐".repeat(offer.rating || 0);

let cardHTML=`
<div class="${offer.featured?'featured':'offer-card'}">
<h3>${offer.title}</h3>
<p>${offer.description}</p>
<div>${stars}</div>
${offer.image?`<img src="${offer.image}">`:""}
${offer.video?`<video src="${offer.video}" controls></video>`:""}
<p>👁 ${offer.clicks || 0} clicks</p>
<a href="${offer.link}" target="_blank" onclick="countClick(${index})" class="join-btn">🔥 Get Offer</a>
</div>
`;

if(offer.featured){
featured.innerHTML+=cardHTML;
}else{
container.innerHTML+=cardHTML;
}
});
}

function countClick(index){
offers[index].clicks=(offers[index].clicks||0)+1;
localStorage.setItem("primex_offers",JSON.stringify(offers));
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

renderOffers();
</script>

</body>
</html>
