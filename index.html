<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeX Loot & Earning</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
}

/* Animated Header */
header{
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
background:linear-gradient(270deg,#ff512f,#dd2476,#ff512f);
background-size:400% 400%;
animation:move 6s infinite;
}
@keyframes move{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Buttons */
.top-buttons{
text-align:center;
padding:10px;
background:#1e293b;
}
.top-buttons a{
display:inline-block;
margin:5px;
padding:8px 15px;
background:#ff512f;
border-radius:20px;
color:white;
text-decoration:none;
font-weight:bold;
}

/* Cards */
.container{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:15px;
}

.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.card img, .card video{
width:100%;
max-height:250px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.join{
display:block;
margin-top:10px;
background:#22c55e;
padding:10px;
border-radius:20px;
text-align:center;
color:white;
text-decoration:none;
font-weight:bold;
}

/* Popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
opacity:0;
transition:0.3s;
}

.popup.active{
visibility:visible;
opacity:1;
}

.popup-box{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
width:280px;
}

.popup-box button{
margin-top:10px;
padding:8px 15px;
border:none;
border-radius:20px;
background:#ff512f;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<header>🔥 PrimeX Loot & Earning</header>

<div class="top-buttons">
<a href="https://t.me/+iu2fM-K0fVczMTE9" target="_blank">📢 Join Channel</a>
<a href="https://t.me/Primex_Shop07_Bot" target="_blank">💬 Support</a>
</div>

<div class="container" id="offers"></div>

<!-- Popup -->
<div class="popup" id="popup">
<div class="popup-box">
<h3>Join Our Channel 🚀</h3>
<p>Daily Loot & Earning Updates</p>
<a href="https://t.me/+iu2fM-K0fVczMTE9" target="_blank">Join Now</a>
<br>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>
let offers = JSON.parse(localStorage.getItem("offers")) || [];

function render(){
let container=document.getElementById("offers");
container.innerHTML="";
offers.forEach(o=>{
if(!o.active) return;
container.innerHTML+=`
<div class="card">
${o.mediaType==="image" ? `<img src="${o.media}">` : ""}
${o.mediaType==="video" ? `<video controls src="${o.media}"></video>` : ""}
<div class="card-body">
<h3>${o.title}</h3>
<p>${o.desc}</p>
<a class="join" href="${o.link}" target="_blank">🔥 Grab Offer</a>
</div>
</div>
`;
});
}

function closePopup(){
document.getElementById("popup").classList.remove("active");
}

setTimeout(()=>{
document.getElementById("popup").classList.add("active");
},3000);

render();
</script>

</body>
</html>
