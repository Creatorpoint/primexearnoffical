<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prime Earn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCJIU56dxgxS2cIh99zSvp_FAn9hrSSl0g",
authDomain: "prime-earn-49202.firebaseapp.com",
databaseURL: "https://prime-earn-49202-default-rtdb.firebaseio.com",
projectId: "prime-earn-49202",
storageBucket: "prime-earn-49202.firebasestorage.app",
messagingSenderId: "533446392320",
appId: "1:533446392320:web:5cdda6a2fb9a57870eb6e5"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

onValue(ref(db,"offers"),snap=>{
offers.innerHTML="";
snap.forEach(child=>{
let d=child.val();
if(d.status=="active"){
offers.innerHTML+=`
<div class="card">
<img src="${d.image}" width="100%">
<h2>${d.title}</h2>
<p>${d.details}</p>
<a href="${d.link}" target="_blank">
<button>Grab Offer</button>
</a>
</div>
`;
}
});
});

onValue(ref(db,"broadcast"),snap=>{
if(snap.exists()){
let b=snap.val();
if(b.active){
popup.innerHTML=`<h3>${b.title}</h3><p>${b.message}</p><button onclick="closePop()">Close</button>`;
popup.style.display="block";
}
}
});

window.closePop=function(){
popup.style.display="none";
}
</script>

<style>
body{background:#111;color:white;font-family:Arial;margin:0;padding:15px}
header{text-align:center;margin-bottom:20px}
header img{
width:90px;height:90px;border-radius:50%;
box-shadow:0 0 25px #00f2ff;
}
.card{
background:#1a1a1a;
padding:15px;
margin:15px 0;
border-radius:12px;
box-shadow:0 0 15px #00f2ff33;
}
button{
background:#00f2ff;
color:black;
padding:10px;
border:none;
border-radius:8px;
font-weight:bold;
}
#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000;
padding:20px;
border-radius:12px;
box-shadow:0 0 30px #00f2ff;
display:none;
width:80%;
}
</style>
</head>

<body>

<header>
<img src="https://files.catbox.moe/zwol8e.jpg">
<h1>Prime Earn Offers</h1>
</header>

<div id="offers"></div>

<div id="popup"></div>

</body>
</html>
