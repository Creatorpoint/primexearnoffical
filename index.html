<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prime Earn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCJIU56dxgxS2cIh99zSvp_FAn9hrSSl0g",
authDomain: "prime-earn-49202.firebaseapp.com",
databaseURL: "https://prime-earn-49202-default-rtdb.firebaseio.com",
projectId: "prime-earn-49202",
storageBucket: "prime-earn-49202.firebasestorage.app",
messagingSenderId: "533446392320",
appId: "1:533446392320:web:5cdda6a2fb9a57870eb6e5"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

onValue(ref(db,"offers"),snap=>{
offers.innerHTML="";
snap.forEach(child=>{
let d=child.val();
if(d.status==="active"){
offers.innerHTML+=`
<div class="card">
<img src="https://files.catbox.moe/zwol8e.jpg" class="logo">
${d.image?`<img src="${d.image}" width="100%">`:""}
${d.video?`<video src="${d.video}" controls width="100%"></video>`:""}
<h2>${d.title}</h2>
<p>${d.details||""}</p>

<div class="profit">
<span>User Earn: ₹${d.userProfit||0}</span>
<span>Your Profit: ₹${d.adminProfit||0}</span>
</div>

<button onclick="window.open('${d.link}','_blank')">Grab Loot</button>
</div>
`;
}
});
});
</script>

<style>
body{background:#111;color:white;font-family:Arial;margin:0;padding:15px}

.card{
background:#1a1a1a;
padding:15px;
margin:20px 0;
border-radius:15px;
box-shadow:
0 0 10px #00f2ff,
0 0 20px #00f2ff,
0 0 30px #00f2ff;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px #00f2ff;}
to{box-shadow:0 0 35px #00f2ff;}
}

.logo{
width:60px;
height:60px;
border-radius:50%;
display:block;
margin:auto;
box-shadow:0 0 20px #00f2ff;
}

.profit{
display:flex;
justify-content:space-between;
margin:10px 0;
font-weight:bold;
color:#00f2ff;
}

button{
background:#00f2ff;
color:black;
padding:10px;
border:none;
border-radius:8px;
font-weight:bold;
width:100%;
}
</style>
</head>

<body>

<h1 style="text-align:center;">🔥 Prime Earn Loot Offers 🔥</h1>

<div id="offers"></div>

</body>
</html>
