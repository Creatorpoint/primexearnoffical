<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prime Earn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCJIU56dxgxS2cIh99zSvp_FAn9hrSSl0g",
authDomain: "prime-earn-49202.firebaseapp.com",
databaseURL: "https://prime-earn-49202-default-rtdb.firebaseio.com",
projectId: "prime-earn-49202",
storageBucket: "prime-earn-49202.firebasestorage.app",
messagingSenderId: "533446392320",
appId: "1:533446392320:web:5cdda6a2fb9a57870eb6e5"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

onValue(ref(db,"offers"),snap=>{
let offers=document.getElementById("offers");
offers.innerHTML="";
snap.forEach(child=>{
let d=child.val();
if(d.status==="active"){
offers.innerHTML+=`
<div class="card">
${d.image?`<img src="${d.image}" width="100%">`:""}
${d.video?`<video src="${d.video}" controls width="100%"></video>`:""}
<h2>${d.title}</h2>
<p>${d.details||""}</p>
<button onclick="openLink('${d.link}')">Grab Offer</button>
</div>
`;
}
});
});

window.openLink=function(url){
window.location.href=url;
}

onValue(ref(db,"broadcast"),snap=>{
if(snap.exists()){
let d=snap.val();
if(d.active){
let box=document.getElementById("popup");
box.innerHTML=`
<p>${d.message}</p>
${d.link?`<a href="${d.link}" target="_blank"><button>Open Link</button></a>`:""}
<button onclick="closePop()">Close</button>
`;
box.style.display="block";
}
}
});

window.closePop=function(){
document.getElementById("popup").style.display="none";
}
</script>

<style>
body{background:#111;color:white;font-family:Arial;margin:0;padding:15px}
.header{text-align:center;margin-bottom:20px}
.buttons{
display:flex;
gap:10px;

}

color:black;

}
.card{

padding:15px;
margin:15px 0;
border-radius:12px;
box-shadow:0 0 20px #00f2ff33;
}
button{
background:#00f2ff;
color:black;
padding:10px;
border:none;
border-radius:8px;
font-weight:bold;
}
#popup{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#000;
padding:15px;
border-radius:12px;
box-shadow:0 0 25px #00f2ff;
display:none;
width:85%;
text-align:center;
}
</style>
</head>
