<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeX Loot & Earning</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:#0f172a;
color:white;
overflow-x:hidden;
}

/* Animated Header */
header{
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
background:linear-gradient(270deg,#ff512f,#dd2476,#ff512f);
background-size:600% 600%;
animation:gradientMove 6s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:15px;
}

.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img, .card video{
width:100%;
max-height:250px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.card h3{
margin:0 0 8px;
color:#facc15;
}

.join{
display:block;
margin-top:10px;
background:#22c55e;
padding:10px;
border-radius:25px;
text-align:center;
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.join:hover{
background:#16a34a;
}

</style>
</head>
<body>

<header>🔥 PrimeX Loot & Earning</header>

<div class="container" id="offers"></div>

<script>

let offers = JSON.parse(localStorage.getItem("offers")) || [];

function render(){
let container=document.getElementById("offers");
container.innerHTML="";

offers.forEach((o,i)=>{
if(!o.active) return;

container.innerHTML+=`
<div class="card">

${o.mediaType==="image" ? `<img src="${o.media}">` : ""}
${o.mediaType==="video" ? `<video controls src="${o.media}"></video>` : ""}

<div class="card-body">
<h3>${o.title}</h3>
<p>${o.desc}</p>
<a class="join" href="${o.link}" target="_blank">🔥 Grab Offer</a>
</div>

</div>
`;
});
}

render();

</script>

</body>
</html>
