<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prime Earn</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCJIU56dxgxS2cIh99zSvp_FAn9hrSSl0g",
authDomain: "prime-earn-49202.firebaseapp.com",
databaseURL: "https://prime-earn-49202-default-rtdb.firebaseio.com",
projectId: "prime-earn-49202",
storageBucket: "prime-earn-49202.firebasestorage.app",
messagingSenderId: "533446392320",
appId: "1:533446392320:web:5cdda6a2fb9a57870eb6e5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db,"offers"),snap=>{
let list=document.getElementById("offers");
list.innerHTML="";
snap.forEach(child=>{
let data=child.val();
if(data.status=="active"){
list.innerHTML+=`
<div class="card">
<img src="${data.image}" width="100%">
<h3>${data.title}</h3>
<a href="${data.link}" target="_blank">
<button>Grab Offer</button>
</a>
</div>
`;
}
});
});

onValue(ref(db,"settings/channel"),snap=>{
if(snap.exists()){
let link=snap.val().link;
document.getElementById("joinBtn").onclick=function(){
window.open(link,"_blank");
}
}
});

onValue(ref(db,"broadcast/message"),snap=>{
if(snap.exists()){
let msg=snap.val().text;
document.getElementById("broadcastBox").innerText=msg;
document.getElementById("broadcastBox").style.display="block";
}
});
</script>

<style>
body{background:#111;color:white;font-family:Arial;padding:15px}
.card{background:#1a1a1a;padding:10px;margin:10px 0;border-radius:10px}
button{background:#00f2ff;color:black;padding:10px;border:none;border-radius:6px}
#popup{
position:fixed;
bottom:20px;
right:20px;
background:#00f2ff;
color:black;
padding:10px;
border-radius:8px;
}
#broadcastBox{
background:red;
padding:10px;
display:none;
margin-bottom:10px;
}
</style>
</head>

<body>

<div id="broadcastBox"></div>

<button id="joinBtn">Join Channel</button>

<div id="offers"></div>

</body>
</html>
