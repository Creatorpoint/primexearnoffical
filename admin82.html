<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PrimeX Admin Panel</title>

<style>

body{
font-family:'Segoe UI';
background:#0f172a;
color:white;
padding:20px;
}

h2{
text-align:center;
background:linear-gradient(45deg,#ff512f,#dd2476);
padding:10px;
border-radius:10px;
}

input,textarea,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:20px;
background:#ff512f;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}

.box{
background:#1e293b;
padding:12px;
border-radius:10px;
margin-top:10px;
}

#panel{display:none;}

</style>
</head>
<body>

<h2>🔐 PrimeX Admin</h2>

<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>

<div id="panel">

<h3>Add Offer</h3>

<input id="title" placeholder="Offer Title">
<textarea id="desc" placeholder="Description"></textarea>
<input id="link" placeholder="Offer Link">

<select id="mediaType">
<option value="image">Image</option>
<option value="video">Video</option>
</select>

<input type="file" id="mediaInput" accept="image/*,video/*">

<button onclick="add()">Publish Offer</button>

<hr>

<h3>Change Password</h3>

<input id="oldpass" placeholder="Old Password">
<input id="newpass" placeholder="New Password">
<button onclick="changePass()">Update Password</button>

<hr>

<h3>Manage Offers</h3>
<div id="list"></div>

</div>

<script>

let password = localStorage.getItem("admin_pass") || "1234";
let offers = JSON.parse(localStorage.getItem("offers")) || [];

function login(){
if(pass.value===password){
panel.style.display="block";
render();
}else{
alert("Wrong Password");
}
}

function changePass(){
if(oldpass.value===password){
localStorage.setItem("admin_pass",newpass.value);
password=newpass.value;
alert("Password Updated");
}else{
alert("Wrong Old Password");
}
}

function add(){

let file = mediaInput.files[0];
if(!file) return alert("Select media");

let reader = new FileReader();

reader.onload=function(e){

let o={
title:title.value,
desc:desc.value,
link:link.value,
media:e.target.result,
mediaType:mediaType.value,
active:true
};

offers.push(o);
localStorage.setItem("offers",JSON.stringify(offers));
alert("Offer Added");
location.reload();
};

reader.readAsDataURL(file);
}

function render(){

list.innerHTML="";

offers.forEach((o,i)=>{
list.innerHTML+=`
<div class="box">
<b>${o.title}</b><br>
<button onclick="toggle(${i})">${o.active?'Deactivate':'Activate'}</button>
<button onclick="del(${i})">Delete</button>
</div>
`;
});
}

function toggle(i){
offers[i].active=!offers[i].active;
localStorage.setItem("offers",JSON.stringify(offers));
render();
}

function del(i){
offers.splice(i,1);
localStorage.setItem("offers",JSON.stringify(offers));
render();
}

</script>

</body>
</html>
