<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prime Earn Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCJIU56dxgxS2cIh99zSvp_FAn9hrSSl0g",
authDomain: "prime-earn-49202.firebaseapp.com",
databaseURL: "https://prime-earn-49202-default-rtdb.firebaseio.com",
projectId: "prime-earn-49202",
storageBucket: "prime-earn-49202.firebasestorage.app",
messagingSenderId: "533446392320",
appId: "1:533446392320:web:5cdda6a2fb9a57870eb6e5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ADMIN_PASSWORD = "prime123";

window.login = function(){
let p=document.getElementById("pass").value;
if(p===ADMIN_PASSWORD){
document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";
}else{
alert("Wrong Password");
}
}

window.addOffer=function(){
let title=title.value.trim();
let details=details.value.trim();
let image=image.value.trim();
let video=video.value.trim();
let link=link.value.trim();

if(!title || !link){
alert("Title & Link required");
return;
}

push(ref(db,"offers"),{
title,details,image,video,link,
status:"active",
time:Date.now()
});

alert("Offer Published");
title.value="";details.value="";image.value="";video.value="";link.value="";
}

window.sendBroadcast=function(){
let msg=bmsg.value.trim();
let link=blink.value.trim();

if(!msg){
alert("Enter message");
return;
}

set(ref(db,"broadcast"),{
message:msg,
link:link,
active:true,
time:Date.now()
});

alert("Broadcast Sent");
}

window.toggleStatus=function(id,status){
update(ref(db,"offers/"+id),{
status: status==="active"?"inactive":"active"
});
}

window.deleteOffer=function(id){
remove(ref(db,"offers/"+id));
}

onValue(ref(db,"offers"),snap=>{
let list=document.getElementById("offerList");
list.innerHTML="";
snap.forEach(child=>{
let d=child.val();
let id=child.key;

list.innerHTML+=`
<div class="card">
<h3>${d.title}</h3>
<p>${d.details||""}</p>
<p>Status: ${d.status}</p>
<button onclick="toggleStatus('${id}','${d.status}')">Toggle</button>
<button onclick="deleteOffer('${id}')">Delete</button>
</div>
`;
});
});
</script>

<style>
body{background:#0f0f0f;color:white;font-family:Arial;padding:20px}
input,textarea,button{
width:100%;padding:10px;margin:8px 0;border-radius:8px;border:none
}
input,textarea{background:#1a1a1a;color:white}
button{background:#00f2ff;color:black;font-weight:bold}
.card{
background:#1a1a1a;
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 0 20px #00f2ff44;
}
</style>
</head>

<body>

<div id="loginBox">
<h2>Admin Login</h2>
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none">

<h3>Publish Offer</h3>
<input id="title" placeholder="Offer Title">
<textarea id="details" placeholder="Offer Details"></textarea>
<input id="image" placeholder="Image URL">
<input id="video" placeholder="Video URL (mp4 link)">
<input id="link" placeholder="Offer Redirect Link">
<button onclick="addOffer()">Publish Offer</button>

<h3>Broadcast</h3>
<input id="bmsg" placeholder="Broadcast Message">
<input id="blink" placeholder="Broadcast Link (optional)">
<button onclick="sendBroadcast()">Send Broadcast</button>

<h3>All Offers</h3>
<div id="offerList"></div>

</div>

</body>
</html>
