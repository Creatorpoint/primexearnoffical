<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prime Earn Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCJIU56dxgxS2cIh99zSvp_FAn9hrSSl0g",
authDomain: "prime-earn-49202.firebaseapp.com",
databaseURL: "https://prime-earn-49202-default-rtdb.firebaseio.com",
projectId: "prime-earn-49202",
storageBucket: "prime-earn-49202.firebasestorage.app",
messagingSenderId: "533446392320",
appId: "1:533446392320:web:5cdda6a2fb9a57870eb6e5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.addOffer = function(){
let title=document.getElementById("title").value.trim();
let details=document.getElementById("details").value.trim();
let image=document.getElementById("image").value.trim();
let link=document.getElementById("link").value.trim();

if(!title || !link){
alert("Title & Link required");
return;
}

push(ref(db,"offers"),{
title:title,
details:details,
image:image,
link:link,
status:"active",
time:Date.now()
});

alert("Offer Added Successfully");
document.getElementById("title").value="";
document.getElementById("details").value="";
document.getElementById("image").value="";
document.getElementById("link").value="";
}

window.sendBroadcast=function(){
let msg=document.getElementById("broadcast").value.trim();
if(!msg){
alert("Enter message");
return;
}
set(ref(db,"broadcast"),{
message:msg,
active:true,
time:Date.now()
});
alert("Broadcast Sent");
}

window.toggleStatus=function(id,status){
update(ref(db,"offers/"+id),{
status: status==="active"?"inactive":"active"
});
}

window.deleteOffer=function(id){
remove(ref(db,"offers/"+id));
}

onValue(ref(db,"offers"),snap=>{
let list=document.getElementById("offerList");
list.innerHTML="";
snap.forEach(child=>{
let d=child.val();
let id=child.key;
list.innerHTML+=`
<div class="card">
<h3>${d.title}</h3>
<p>${d.details||""}</p>
<p>Status: ${d.status}</p>
<button onclick="toggleStatus('${id}','${d.status}')">Toggle</button>
<button onclick="deleteOffer('${id}')">Delete</button>
</div>
`;
});
});
</script>

<style>
body{background:#0f0f0f;color:white;font-family:Arial;padding:20px}
input,textarea,button{
width:100%;padding:10px;margin:8px 0;border-radius:8px;border:none
}
input,textarea{background:#1a1a1a;color:white}
button{background:#00f2ff;color:black;font-weight:bold}
.card{
background:#1a1a1a;
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 0 15px #00f2ff33;
}
</style>
</head>

<body>

<h2>Admin Panel</h2>

<h3>Add Offer</h3>
<input id="title" placeholder="Offer Title">
<textarea id="details" placeholder="Offer Details"></textarea>
<input id="image" placeholder="Image URL">
<input id="link" placeholder="Offer Link">
<button onclick="addOffer()">Add Offer</button>

<h3>Broadcast</h3>
<input id="broadcast" placeholder="Broadcast Message">
<button onclick="sendBroadcast()">Send Broadcast</button>

<h3>All Offers</h3>
<div id="offerList"></div>

</body>
</html>
