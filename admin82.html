<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prime Earn Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCJIU56dxgxS2cIh99zSvp_FAn9hrSSl0g",
authDomain: "prime-earn-49202.firebaseapp.com",
databaseURL: "https://prime-earn-49202-default-rtdb.firebaseio.com",
projectId: "prime-earn-49202",
storageBucket: "prime-earn-49202.firebasestorage.app",
messagingSenderId: "533446392320",
appId: "1:533446392320:web:5cdda6a2fb9a57870eb6e5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let ADMIN_PASSWORD = "12345";

window.login = function(){
let pass=document.getElementById("pass").value;
if(pass===ADMIN_PASSWORD){
document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";
}else alert("Wrong Password");
}

window.addOffer=function(){
let title=titleInp.value;
let details=detailsInp.value;
let img=imageInp.value;
let link=linkInp.value;

push(ref(db,"offers"),{
title:title,
details:details,
image:img,
link:link,
status:"active"
});
alert("Offer Added");
}

window.editOffer=function(id){
let newTitle=prompt("New Title:");
let newDetails=prompt("New Details:");
update(ref(db,"offers/"+id),{
title:newTitle,
details:newDetails
});
}

window.toggleStatus=function(id,status){
update(ref(db,"offers/"+id),{
status: status=="active"?"inactive":"active"
});
}

window.deleteOffer=function(id){
remove(ref(db,"offers/"+id));
}

window.sendBroadcast=function(){
let btitle=bTitle.value;
let bmsg=bMsg.value;
let active=bActive.checked;

set(ref(db,"broadcast"),{
title:btitle,
message:bmsg,
active:active
});
alert("Broadcast Updated");
}

onValue(ref(db,"offers"),snap=>{
offerList.innerHTML="";
snap.forEach(child=>{
let d=child.val();
let id=child.key;

offerList.innerHTML+=`
<div class="card">
<h3>${d.title}</h3>
<p>${d.details}</p>
<p>Status: ${d.status}</p>
<button onclick="toggleStatus('${id}','${d.status}')">Toggle</button>
<button onclick="editOffer('${id}')">Edit</button>
<button onclick="deleteOffer('${id}')">Delete</button>
</div>
`;
});
});
</script>

<style>
body{background:#0f0f0f;color:white;font-family:Arial;margin:0}
header{
background:#111;
text-align:center;
padding:15px;
box-shadow:0 0 20px #00f2ff;
}
header img{
width:80px;
height:80px;
border-radius:50%;
box-shadow:0 0 25px #00f2ff;
}
.container{padding:20px}
input,textarea,button{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:none;
}
input,textarea{background:#1a1a1a;color:white}
button{background:#00f2ff;color:black;font-weight:bold}
.card{
background:#1a1a1a;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 0 10px #00f2ff33;
}
</style>
</head>

<body>

<header>
<img src="https://files.catbox.moe/zwol8e.jpg">
<h2>Prime Earn Admin</h2>
</header>

<div class="container">

<div id="loginBox">
<h3>Admin Login</h3>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none">

<h3>Add Offer</h3>
<input id="titleInp" placeholder="Offer Title">
<textarea id="detailsInp" placeholder="Offer Details"></textarea>
<input id="imageInp" placeholder="Image URL">
<input id="linkInp" placeholder="Offer Link">
<button onclick="addOffer()">Add Offer</button>

<h3>Broadcast System</h3>
<input id="bTitle" placeholder="Broadcast Title">
<textarea id="bMsg" placeholder="Broadcast Message"></textarea>
<label><input type="checkbox" id="bActive"> Activate Broadcast</label>
<button onclick="sendBroadcast()">Update Broadcast</button>

<h3>All Offers</h3>
<div id="offerList"></div>

</div>
</div>

</body>
</html>
