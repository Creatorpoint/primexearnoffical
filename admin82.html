<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prime Earn Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCJIU56dxgxS2cIh99zSvp_FAn9hrSSl0g",
authDomain: "prime-earn-49202.firebaseapp.com",
databaseURL: "https://prime-earn-49202-default-rtdb.firebaseio.com",
projectId: "prime-earn-49202",
storageBucket: "prime-earn-49202.firebasestorage.app",
messagingSenderId: "533446392320",
appId: "1:533446392320:web:5cdda6a2fb9a57870eb6e5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let ADMIN_PASSWORD = "12345";

window.login = function(){
let pass = document.getElementById("pass").value;
if(pass === ADMIN_PASSWORD){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
}else{
alert("Wrong Password");
}
}

window.addOffer = function(){
let title = document.getElementById("title").value;
let img = document.getElementById("image").value;
let link = document.getElementById("link").value;

if(title=="" || link==""){
alert("Required fields missing");
return;
}

push(ref(db,"offers"),{
title:title,
image:img,
link:link,
status:"active"
});

alert("Offer Added");
}

window.broadcast = function(){
let msg = document.getElementById("broadcast").value;
set(ref(db,"broadcast/message"),{
text:msg,
time:Date.now()
});
alert("Broadcast Sent");
}

window.updateChannel = function(){
let ch = document.getElementById("channel").value;
set(ref(db,"settings/channel"),{
link:ch
});
alert("Channel Updated");
}

window.toggleStatus = function(id,status){
update(ref(db,"offers/"+id),{
status: status=="active"?"inactive":"active"
});
}

window.deleteOffer = function(id){
remove(ref(db,"offers/"+id));
}

onValue(ref(db,"offers"),snap=>{
let list = document.getElementById("offerList");
list.innerHTML="";
snap.forEach(child=>{
let data=child.val();
let id=child.key;

list.innerHTML+=`
<div class="card">
<h4>${data.title}</h4>
<p>Status: ${data.status}</p>
<button onclick="toggleStatus('${id}','${data.status}')">Toggle</button>
<button onclick="deleteOffer('${id}')">Delete</button>
</div>
`;
});
});
</script>

<style>
body{background:#0f0f0f;color:white;font-family:Arial;padding:20px}
input,button{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none}
button{background:#00f2ff;color:black;font-weight:bold}
.card{background:#1a1a1a;padding:10px;margin:10px 0;border-radius:8px}
</style>
</head>

<body>

<div id="login">
<h2>Admin Login</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none">

<h3>Add Offer</h3>
<input id="title" placeholder="Offer Title">
<input id="image" placeholder="Image URL">
<input id="link" placeholder="Offer Link">
<button onclick="addOffer()">Add Offer</button>

<h3>Channel Link Update</h3>
<input id="channel" placeholder="Telegram Channel Link">
<button onclick="updateChannel()">Update Channel</button>

<h3>Broadcast Message</h3>
<input id="broadcast" placeholder="Enter Announcement">
<button onclick="broadcast()">Send Broadcast</button>

<h3>Offers List</h3>
<div id="offerList"></div>

</div>

</body>
</html>
