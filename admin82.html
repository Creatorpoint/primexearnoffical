<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prime Earn Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCJIU56dxgxS2cIh99zSvp_FAn9hrSSl0g",
authDomain: "prime-earn-49202.firebaseapp.com",
databaseURL: "https://prime-earn-49202-default-rtdb.firebaseio.com",
projectId: "prime-earn-49202",
storageBucket: "prime-earn-49202.firebasestorage.app",
messagingSenderId: "533446392320",
appId: "1:533446392320:web:5cdda6a2fb9a57870eb6e5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ADMIN_PASSWORD = "primeearn123";

window.login = function(){
if(document.getElementById("pass").value === ADMIN_PASSWORD){
loginBox.style.display="none";
panel.style.display="block";
}else{
alert("Wrong Password");
}
}

window.publishOffer = function(){
let title=titleInp.value.trim();
let details=detailsInp.value.trim();
let image=imageInp.value.trim();
let video=videoInp.value.trim();
let link=linkInp.value.trim();
let userProfit=userProfitInp.value.trim();
let adminProfit=adminProfitInp.value.trim();

if(!title || !link){
alert("Title & Link required");
return;
}

push(ref(db,"offers"),{
title,details,image,video,link,
userProfit,adminProfit,
status:"active",
time:Date.now()
});

alert("Loot Published Successfully");
titleInp.value="";
detailsInp.value="";
imageInp.value="";
videoInp.value="";
linkInp.value="";
userProfitInp.value="";
adminProfitInp.value="";
}

window.toggleStatus=function(id,status){
update(ref(db,"offers/"+id),{
status: status==="active"?"inactive":"active"
});
}

window.deleteOffer=function(id){
remove(ref(db,"offers/"+id));
}

onValue(ref(db,"offers"),snap=>{
offerList.innerHTML="";
snap.forEach(child=>{
let d=child.val();
let id=child.key;

offerList.innerHTML+=`
<div class="card">
<h3>${d.title}</h3>
<p>User Profit: ₹${d.userProfit || 0}</p>
<p>Your Profit: ₹${d.adminProfit || 0}</p>
<p>Status: ${d.status}</p>
<button onclick="toggleStatus('${id}','${d.status}')">Toggle</button>
<button onclick="deleteOffer('${id}')">Delete</button>
</div>
`;
});
});
</script>

<style>
body{background:#0f0f0f;color:white;font-family:Arial;padding:20px}
input,textarea,button{
width:100%;padding:10px;margin:8px 0;border-radius:8px;border:none
}
input,textarea{background:#1a1a1a;color:white}
button{background:#00f2ff;color:black;font-weight:bold}
.card{
background:#1a1a1a;
padding:15px;
margin:10px 0;
border-radius:12px;
box-shadow:0 0 25px #00f2ff;
}
</style>
</head>

<body>

<div id="loginBox">
<h2>Admin Login</h2>
<input type="password" id="pass" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none">

<h3>Publish Loot / Earning Offer</h3>
<input id="titleInp" placeholder="Offer Title">
<textarea id="detailsInp" placeholder="Offer Details"></textarea>
<input id="imageInp" placeholder="Image URL">
<input id="videoInp" placeholder="Video URL (optional)">
<input id="linkInp" placeholder="Offer Link">
<input id="userProfitInp" placeholder="User Profit (₹)">
<input id="adminProfitInp" placeholder="Your Profit (₹)">
<button onclick="publishOffer()">Publish Offer</button>

<h3>All Published Offers</h3>
<div id="offerList"></div>

</div>

</body>
</html>
